
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTP Verification</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }

    .code-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
    }

    .code {
        width: 40px;
        height: 50px;
        font-size: 24px;
        text-align: center;
    }
</style>

</head>
<body>

<h2 id="verification_heading">Verify Your Account</h2>
<p id="verification_subtext">
    We emailed you the six digit code. Enter the code below to confirm your email address.
</p>

<div class="code-container">
    <input type="text" maxlength="1" class="code">
    <input type="text" maxlength="1" class="code">
    <input type="text" maxlength="1" class="code">
    <input type="text" maxlength="1" class="code">
    <input type="text" maxlength="1" class="code">
    <input type="text" maxlength="1" class="code">
</div>

<script>
const codes = document.querySelectorAll('.code');

// Focus first input on load
codes[0].focus();

codes.forEach((code, index) => {
    code.addEventListener('input', (e) => {
        const value = e.target.value;

        // Allow only numbers
        if (!/^[0-9]$/.test(value)) {
            e.target.value = '';
            return;
        }

        // Move to next input
        if (value && index < codes.length - 1) {
            codes[index + 1].focus();
        }
    });

    code.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
            if (code.value === '' && index > 0) {
                codes[index - 1].focus();
            }
        }
    });
});
</script>

</body>
</html>
